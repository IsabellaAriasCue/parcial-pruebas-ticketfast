services:
  db-test:
    image: postgres:16-alpine
    container_name: ticketfast-db-test
    environment:
      POSTGRES_DB: ticketfast_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticketfast_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"

  api-test:
    build: .
    container_name: ticketfast-api-test
    depends_on:
      db-test:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db-test:5432/ticketfast_test
    ports:
      - "8001:8000"